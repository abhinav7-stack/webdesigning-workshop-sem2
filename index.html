<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Chess Arena - React</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#121212;
      color:white;
    }

    header{
      position:sticky;
      top:0;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 8%;
      background:#1c1c1c;
    }

    .logo{
      font-size:22px;
      font-weight:bold;
      color:#f0d9b5;
    }

    nav a{
      text-decoration:none;
      color:white;
      margin-left:20px;
    }

    nav a:hover{
      color:#f0d9b5;
    }

    .hero{
      min-height:90vh;
      background:url("https://images.unsplash.com/photo-1528819622765-d6bcf132f793")
      no-repeat center/cover;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      position:relative;
    }

    .hero::after{
      content:"";
      position:absolute;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.65);
      top:0;
      left:0;
    }

    .hero-content{
      position:relative;
      z-index:2;
      background:rgba(0,0,0,0.5);
      padding:40px;
      border-radius:8px;
    }

    .btn{
      padding:12px 28px;
      background:#f0d9b5;
      color:black;
      border:none;
      cursor:pointer;
      font-weight:bold;
      margin-top:20px;
    }

    .btn:hover{
      background:#b58863;
      color:white;
    }

    .features{
      padding:80px 8%;
      text-align:center;
      background:#1e1e1e;
    }

    .feature-box{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:30px;
      margin-top:40px;
    }

    .box{
      background:#2a2a2a;
      padding:30px;
      border-radius:6px;
    }

    footer{
      background:#0f0f0f;
      padding:50px 8%;
      text-align:center;
    }

  </style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">
function App(){

  const features = [
    { title:"♟ Smart Interface", desc:"Clean and easy-to-use chess board design." },
    { title:"📚 Learn & Practice", desc:"Understand strategies and improve daily." },
    { title:"📱 Fully Responsive", desc:"Play smoothly on mobile, tablet or desktop." }
  ];

  return(
    <>
      <header>
        <div className="logo">♟ Chess Arena</div>
        <nav>
          <a href="#">Home</a>
          <a href="#">Play</a>
          <a href="#">Learn</a>
          <a href="#">Contact</a>
        </nav>
      </header>

      <section className="hero">
        <div className="hero-content">
          <h1>Master the Game of Chess</h1>
          <p>Improve your skills and enjoy strategic gameplay.</p>
          <button className="btn" onClick={()=>alert("Game Starting Soon!")}>
            Start Playing
          </button>
        </div>
      </section>

      <section className="features">
        <h2 style={{color:"#f0d9b5"}}>Platform Features</h2>
        <div className="feature-box">
          {features.map((item,index)=>(
            <div className="box" key={index}>
              <h3 style={{color:"#f0d9b5"}}>{item.title}</h3>
              <p>{item.desc}</p>
            </div>
          ))}
        </div>
      </section>

      <footer>
        © 2026 Chess Arena | Student Project
      </footer>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);

</script>

</body>
</html>
